<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Admin - MAN 1 Kota Cirebon</title>
    <!-- Modern Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
        background: linear-gradient(135deg, #29abe2 0%, #0071bc 100%);
        min-height: 100vh;
      }

      .font-heading {
        font-family: "Outfit", sans-serif;
      }

      .glass-card {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      }

      /* Subtle animated background elements */
      .bubble {
        position: absolute;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 50%;
        animation: float 8s infinite ease-in-out;
      }

      @keyframes float {
        0% {
          transform: translateY(0) scale(1);
        }
        50% {
          transform: translateY(-20px) scale(1.05);
        }
        100% {
          transform: translateY(0) scale(1);
        }
      }
    </style>
  </head>

  <body class="flex items-center justify-center relative overflow-hidden">
    <!-- Decorative Bubbles -->
    <div class="bubble w-64 h-64 -top-20 -left-20"></div>
    <div
      class="bubble w-96 h-96 bottom-0 right-0 opacity-50 animation-delay-2000"
    ></div>
    <div
      class="bubble w-32 h-32 top-1/4 right-1/4 opacity-30 animation-delay-4000"
    ></div>

    <div class="z-10 w-full max-w-md p-6">
      <!-- Back to Home Link -->
      <a
        href="index.html"
        class="inline-flex items-center text-white/80 hover:text-white mb-6 transition-colors duration-200 font-medium"
      >
        <i class="fas fa-arrow-left mr-2"></i> Kembali ke Beranda
      </a>

      <!-- Login Card -->
      <div
        class="glass-card rounded-3xl overflow-hidden transform transition-all hover:scale-[1.01] duration-300"
      >
        <div class="p-8">
          <!-- Logo & Title -->
          <div class="text-center mb-8">
            <div
              class="w-20 h-20 bg-orange-100 rounded-full flex items-center justify-center mx-auto mb-4 shadow-inner"
            >
              <i class="fas fa-user-shield text-4xl text-orange-500"></i>
            </div>
            <h2 class="text-3xl font-heading font-bold text-gray-800">
              Admin Login
            </h2>
            <p class="text-sm text-gray-500 mt-2 font-medium">
              Masuk untuk mengelola sistem Madrasah
            </p>
          </div>

          <!-- Form -->
          <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-6">
            <div class="space-y-2">
              <label
                for="username"
                class="text-sm font-semibold text-gray-700 block"
                >Username</label
              >
              <div class="relative">
                <div
                  class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"
                >
                  <i class="fas fa-user text-gray-400"></i>
                </div>
                <input
                  type="text"
                  id="username"
                  name="username"
                  required
                  class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none transition-all duration-200 bg-gray-50 text-gray-800"
                  placeholder="Masukkan username admin"
                />
              </div>
            </div>

            <div class="space-y-2">
              <div class="flex justify-between items-center">
                <label
                  for="password"
                  class="text-sm font-semibold text-gray-700 block"
                  >Password</label
                >
              </div>
              <div class="relative flex items-center">
                <div
                  class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"
                >
                  <i class="fas fa-lock text-gray-400"></i>
                </div>
                <input
                  type="password"
                  id="password"
                  name="password"
                  required
                  class="w-full pl-10 pr-12 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none transition-all duration-200 bg-gray-50 text-gray-800"
                  placeholder="Masukkan password"
                />
                <button
                  type="button"
                  onclick="togglePassword()"
                  class="absolute right-3 text-gray-400 hover:text-orange-500 transition-colors focus:outline-none"
                >
                  <i class="fas fa-eye" id="eyeIcon"></i>
                </button>
              </div>
            </div>

            <div class="flex items-center justify-between mt-4">
              <div class="flex items-center">
                <input
                  id="remember-me"
                  name="remember-me"
                  type="checkbox"
                  class="h-4 w-4 text-orange-500 focus:ring-orange-500 border-gray-300 rounded cursor-pointer"
                />
                <label
                  for="remember-me"
                  class="ml-2 block text-sm text-gray-600 cursor-pointer"
                >
                  Ingat saya
                </label>
              </div>
              <div class="text-sm">
                <a
                  href="#"
                  class="font-medium text-orange-600 hover:text-orange-500 transition-colors"
                  >Lupa password?</a
                >
              </div>
            </div>

            <button
              type="submit"
              id="submitBtn"
              class="w-full bg-orange-500 text-white font-semibold py-3 px-4 rounded-xl shadow-lg hover:bg-orange-600 hover:shadow-xl focus:ring-4 focus:ring-orange-300 transition-all duration-200 flex items-center justify-center transform hover:-translate-y-0.5"
            >
              <span id="btnText">Masuk ke Dashboard</span>
              <i class="fas fa-sign-in-alt ml-2" id="btnIcon"></i>
            </button>
          </form>

          <div class="mt-8 text-center text-sm text-gray-500">
            &copy; 2026 MAN 1 Kota Cirebon. Hak Cipta Dilindungi.
          </div>
        </div>
      </div>
    </div>

    <script>
      function togglePassword() {
        const passwordInput = document.getElementById("password");
        const eyeIcon = document.getElementById("eyeIcon");

        if (passwordInput.type === "password") {
          passwordInput.type = "text";
          eyeIcon.classList.remove("fa-eye");
          eyeIcon.classList.add("fa-eye-slash");
        } else {
          passwordInput.type = "password";
          eyeIcon.classList.remove("fa-eye-slash");
          eyeIcon.classList.add("fa-eye");
        }
      }

      function handleLogin(e) {
        e.preventDefault();

        // Add loading state
        const btn = document.getElementById("submitBtn");
        const btnText = document.getElementById("btnText");
        const btnIcon = document.getElementById("btnIcon");

        const originalText = btnText.innerText;
        const originalIconClass = btnIcon.className;

        btnText.innerText = "Memverifikasi...";
        btnIcon.className = "fas fa-spinner fa-spin ml-2";
        btn.classList.add("opacity-80", "cursor-wait");

        // Simulate API call/processing
        setTimeout(() => {
          alert("Login Berhasil! Mengalihkan ke dashboard admin...");
          // Reset button state
          btnText.innerText = originalText;
          btnIcon.className = originalIconClass;
          btn.classList.remove("opacity-80", "cursor-wait");

          // Here you would redirect to actual dashboard (sementara ke index dulu)
          window.location.href = "admin_gurus.html";

          // Clear form
          e.target.reset();
        }, 1500);
      }
    </script>
  </body>
</html>
