<!doctype html>
<html lang="id">
  <head>
    <!-- Meta Karakter -->
    <meta charset="UTF-8" />
    <!-- Meta Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Nama Taskbar -->
    <title>MAN 1 Kota Cirebon - Clone</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <!-- CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- ICON -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body class="bg-gray-50">
    <div id="navbar"></div>
    <div id="content"></div>
    <div id="footer"></div>

    <!-- Script Utama -->
    <script>
      let semuaGuru = [];

      async function loadComponent(id, url) {
        try {
          const response = await fetch(url);
          if (!response.ok) throw new Error(`Gagal memuat ${url}`);
          let content = await response.text();

          // Fix relative paths for subpages
          content = content
            .replace(/href="pages\//g, 'href="')
            .replace(/src="\.\//g, 'src="../')
            .replace(/href="login\.html"/g, 'href="../login.html"')
            .replace(/href="index\.html"/g, 'href="../index.html"');

          document.getElementById(id).innerHTML = content;
        } catch (error) {
          console.error(error);
        }
      }

      async function initializePage() {
        // Load Navbar and Footer
        await loadComponent("navbar", "../components/navbar.html");
        await loadComponent("footer", "../components/footer.html");

        // Load Unique Content
        await loadComponent(
          "content",
          "../components/guru_tendik_content.html",
        );

        // After content is loaded, initialize teacher logic
        await loadGurus();
        setupFilters();
        attachNavbarEvents();
      }

      async function loadGurus() {
        try {
          const res = await fetch("../gurus.json");
          if (!res.ok) throw new Error("gagal memuat data guru");
          semuaGuru = await res.json();

          populateJabatanDropdown(semuaGuru);
          populateStatusDropdown(semuaGuru);
          renderGurus(semuaGuru);
        } catch (err) {
          console.error(err);
        }
      }

      function populateJabatanDropdown(data) {
        const select = document.getElementById("filter-jabatan");
        if (!select) return;
        const jabatanSet = new Set();
        data.forEach((guru) => {
          if (guru.jabatan) jabatanSet.add(guru.jabatan);
        });
        const sortedJabatan = Array.from(jabatanSet).sort();
        sortedJabatan.forEach((jabatan) => {
          const option = document.createElement("option");
          option.value = jabatan;
          option.textContent = jabatan;
          select.appendChild(option);
        });
      }

      function populateStatusDropdown(data) {
        const select = document.getElementById("filter-status");
        if (!select) return;
        const statusSet = new Set();
        data.forEach((guru) => {
          if (guru.status && guru.status !== "-") statusSet.add(guru.status);
        });
        const sortedStatus = Array.from(statusSet).sort();
        sortedStatus.forEach((status) => {
          const option = document.createElement("option");
          option.value = status;
          option.textContent = status;
          select.appendChild(option);
        });
      }

      function renderGurus(data) {
        window.currentRenderedGurus = data;
        const container = document.getElementById("guru-container");
        const noResults = document.getElementById("no-results");
        if (!container || !noResults) return;
        container.innerHTML = "";

        if (data.length === 0) {
          container.classList.add("hidden");
          noResults.classList.remove("hidden");
          return;
        }

        container.classList.remove("hidden");
        noResults.classList.add("hidden");

        data.forEach((guru, index) => {
          const card = document.createElement("div");
          card.className =
            "bg-gradient-to-br from-[#2ebcb9] to-[#0a95ff] rounded-xl p-5 text-white shadow-lg relative overflow-hidden transition transform hover:-translate-y-1 hover:shadow-xl";
          card.innerHTML = `
            <div class="flex justify-between items-start mb-4 gap-2">
              <div class="w-1/2 pt-2">
                <h3 class="font-bold text-sm truncate uppercase" title="${guru.nama}">${guru.nama}</h3>
                <p class="text-[10px] flex items-center gap-1 mt-1 text-gray-100 truncate" title="${guru.jabatan || "Guru"}">
                  <i class="fas fa-user focus:outline-none"></i> ${guru.jabatan || "Guru"}
                </p>
              </div>
              <div class="w-1/2">
                <img
                  src="${guru.foto ? (guru.foto.startsWith("../") ? guru.foto : "../" + guru.foto) : "https://picsum.photos/200/300?random=" + Math.floor(Math.random() * 100)}"
                  alt="Guru"
                  class="rounded-lg w-full h-40 object-cover shadow border border-white/20"
                  onerror="this.src='../img/default.jpg'"
                />
              </div>
            </div>
            <hr class="border-t border-dashed border-white/50 my-3" />
            <div class="text-[11px] space-y-1.5 font-medium">
              <div class="flex"><span class="w-16">Status</span><span>: ${guru.status || "-"}</span></div>
              <div class="flex"><span class="w-16">NIP</span><span>: ${guru.nip || "-"}</span></div>
              <div class="flex"><span class="w-16">NUPTK</span><span>: ${guru.nuptk || "-"}</span></div>
              <div class="flex"><span class="w-16">HP/WA</span><span>: ${guru.hp || "-"}</span></div>
              <div class="flex"><span class="w-16">Email</span><span class="truncate" title="${guru.email || "-"}">: ${guru.email || "-"}</span></div>
            </div>
            <div class="mt-5 flex justify-between items-center">
              <div class="flex gap-2 text-lg">
                <a href="${guru.facebook || "#"}" class="hover:text-gray-200 transition">
                  <i class="fab fa-facebook"></i>
                </a>
                <a href="${guru.instagram || "#"}" class="hover:text-gray-200 transition">
                  <i class="fab fa-instagram"></i>
                </a>
              </div>
              <button
                onclick="showModal(${index})"
                class="bg-white text-gray-800 text-[11px] px-4 py-1.5 rounded-full flex items-center gap-1.5 font-bold hover:bg-gray-100 transition shadow"
              >
                Lihat <i class="fas fa-eye"></i>
              </button>
            </div>
          `;
          container.appendChild(card);
        });
      }

      function filterGurus() {
        const keyword = document
          .getElementById("search-nama")
          .value.toLowerCase();
        const jabatan = document.getElementById("filter-jabatan").value;
        const status = document.getElementById("filter-status").value;

        const filteredData = semuaGuru.filter((guru) => {
          const matchNama = guru.nama.toLowerCase().includes(keyword);
          const matchJabatan =
            jabatan === "" || (guru.jabatan && guru.jabatan === jabatan);
          const matchStatus =
            status === "" || (guru.status && guru.status === status);
          return matchNama && matchJabatan && matchStatus;
        });

        renderGurus(filteredData);
      }

      function setupFilters() {
        const searchInput = document.getElementById("search-nama");
        const filterJabatan = document.getElementById("filter-jabatan");
        const filterStatus = document.getElementById("filter-status");

        if (searchInput) searchInput.addEventListener("input", filterGurus);
        if (filterJabatan)
          filterJabatan.addEventListener("change", filterGurus);
        if (filterStatus) filterStatus.addEventListener("change", filterGurus);

        // Close modal when clicking outside
        const modal = document.getElementById("guru-modal");
        if (modal) {
          modal.addEventListener("click", (e) => {
            if (e.target === modal) {
              closeModal();
            }
          });
        }
      }

      window.showModal = function (index) {
        if (!window.currentRenderedGurus) return;
        const guru = window.currentRenderedGurus[index];
        const modal = document.getElementById("guru-modal");
        const modalContent = document.getElementById("modal-content");
        if (!modal || !modalContent) return;

        const imgUrl = guru.foto
          ? guru.foto.startsWith("../")
            ? guru.foto
            : "../" + guru.foto
          : "https://picsum.photos/200/300?random=" +
            Math.floor(Math.random() * 100);

        modalContent.innerHTML = `
          <div class="bg-gradient-to-br from-[#2ebcb9] to-[#0a95ff] p-6 text-white text-center rounded-t-2xl relative">
            <div class="w-24 h-24 mx-auto bg-white rounded-full p-1 shadow-lg mb-3">
              <img src="${imgUrl}" alt="${guru.nama}" class="w-full h-full object-cover rounded-full" onerror="this.src='../img/default.jpg'" />
            </div>
            <h3 class="font-bold text-xl uppercase">${guru.nama}</h3>
            <p class="text-sm text-gray-100 mt-1"><i class="fas fa-user-tag mr-1"></i>${guru.jabatan || "Guru"}</p>
          </div>
          <div class="p-6 bg-white text-gray-700 space-y-3 text-sm">
            <div class="flex justify-between border-b pb-2">
              <span class="font-semibold text-gray-500">Status</span>
              <span class="font-medium text-gray-800">${guru.status || "-"}</span>
            </div>
            <div class="flex justify-between border-b pb-2">
              <span class="font-semibold text-gray-500">NIP</span>
              <span class="font-medium text-gray-800">${guru.nip || "-"}</span>
            </div>
            <div class="flex justify-between border-b pb-2">
              <span class="font-semibold text-gray-500">NUPTK</span>
              <span class="font-medium text-gray-800">${guru.nuptk || "-"}</span>
            </div>
            <div class="flex justify-between border-b pb-2">
              <span class="font-semibold text-gray-500">HP/WA</span>
              <span class="font-medium text-gray-800">${guru.hp || "-"}</span>
            </div>
            <div class="flex justify-between border-b pb-2">
              <span class="font-semibold text-gray-500">Email</span>
              <span class="font-medium text-gray-800 truncate pl-4" title="${guru.email || "-"}">${guru.email || "-"}</span>
            </div>
            <div class="flex justify-center gap-4 mt-6 pt-2">
              <a href="${guru.facebook || "#"}" class="w-10 h-10 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center hover:bg-blue-600 hover:text-white transition shadow-sm">
                <i class="fab fa-facebook-f text-lg"></i>
              </a>
              <a href="${guru.instagram || "#"}" class="w-10 h-10 rounded-full bg-pink-100 text-pink-600 flex items-center justify-center hover:bg-pink-600 hover:text-white transition shadow-sm">
                <i class="fab fa-instagram text-lg"></i>
              </a>
            </div>
          </div>
        `;

        modal.classList.remove("hidden");
        modal.classList.add("flex");
        setTimeout(() => {
          modal.classList.remove("opacity-0");
          modal.firstElementChild.classList.remove("scale-95");
          modal.firstElementChild.classList.add("scale-100");
        }, 10);
      };

      window.closeModal = function () {
        const modal = document.getElementById("guru-modal");
        if (!modal) return;
        modal.classList.add("opacity-0");
        modal.firstElementChild.classList.remove("scale-100");
        modal.firstElementChild.classList.add("scale-95");
        setTimeout(() => {
          modal.classList.remove("flex");
          modal.classList.add("hidden");
        }, 300);
      };

      function attachNavbarEvents() {
        const mobileMenuBtn = document.getElementById("mobile-menu-btn");
        const mobileMenu = document.getElementById("mobile-menu");
        const closeMenuBtn = document.getElementById("close-menu");
        const mobileMenuPanel = document.getElementById("mobile-menu-panel");

        if (mobileMenuBtn && mobileMenu && closeMenuBtn && mobileMenuPanel) {
          mobileMenuBtn.addEventListener("click", () => {
            mobileMenu.classList.remove("hidden");
            mobileMenu.classList.add("flex");
            setTimeout(() => {
              mobileMenuPanel.classList.remove("-translate-x-full");
            }, 10);
          });

          closeMenuBtn.addEventListener("click", closeMobileMenu);

          mobileMenu.addEventListener("click", (e) => {
            if (e.target === mobileMenu) closeMobileMenu();
          });
        }

        function closeMobileMenu() {
          mobileMenuPanel.classList.add("-translate-x-full");
          setTimeout(() => {
            mobileMenu.classList.remove("flex");
            mobileMenu.classList.add("hidden");
          }, 300);
        }
      }

      window.toggleSubmenu = function (submenuId) {
        const submenu = document.getElementById(submenuId);
        const chevron = document.getElementById(
          submenuId.replace("-submenu", "-chevron"),
        );
        if (submenu && chevron) {
          submenu.classList.toggle("hidden");
          chevron.style.transform = submenu.classList.contains("hidden")
            ? "rotate(0deg)"
            : "rotate(180deg)";
        }
      };

      document.addEventListener("DOMContentLoaded", initializePage);
    </script>
  </body>
</html>
