<!doctype html>
<html lang="id">
  <head>
    <!-- Meta Karakter -->
    <meta charset="UTF-8" />
    <!-- Meta Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Nama Taskbar -->
    <title>Admin - Kelola Data Guru</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <!-- CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- ICON -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>
  <body class="bg-gray-50 h-screen flex flex-col font-['Inter'] text-sm">
    <!-- Navbar -->
    <nav class="bg-[#29abe2] text-white p-4 shadow-md sticky top-0 z-40">
      <div class="container mx-auto flex justify-between items-center">
        <div class="flex items-center space-x-3">
          <i class="fas fa-database text-2xl"></i>
          <span class="font-bold text-xl font-['Outfit']"
            >Manajemen Data Guru</span
          >
        </div>
        <div class="flex gap-2">
          <button
            onclick="window.location.href = 'index.html'"
            class="bg-white/20 hover:bg-white/30 px-4 py-2 rounded-lg transition text-sm font-medium"
          >
            <i class="fas fa-home mr-1"></i> Beranda Utama
          </button>
          <button
            onclick="downloadJson()"
            class="bg-orange-500 hover:bg-orange-600 px-4 py-2 rounded-lg transition text-sm font-medium shadow-md"
          >
            <i class="fas fa-download mr-1"></i> Unduh JSON
          </button>
        </div>
      </div>
    </nav>

    <main class="flex-1 overflow-auto container mx-auto p-6 max-w-7xl">
      <div class="bg-white rounded-xl shadow-sm border p-6">
        <div
          class="flex flex-col md:flex-row justify-between md:items-center gap-4 mb-6"
        >
          <div>
            <h2 class="text-2xl font-bold text-gray-800 font-['Outfit']">
              Daftar Guru & Tendik
            </h2>
            <p class="text-gray-500 mt-1">Kelola data guru untuk gurus.json</p>
          </div>
          <div class="flex gap-3 items-center">
            <div class="relative">
              <input
                type="text"
                id="search-bar"
                placeholder="Cari nama guru..."
                class="pl-10 pr-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:border-[#29abe2] w-full md:w-64"
                onkeyup="renderTable()"
              />
              <i
                class="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"
              ></i>
            </div>
            <button
              onclick="openModal()"
              class="bg-[#2ebcb9] hover:bg-[#259c99] text-white px-4 py-2 rounded-lg transition font-medium whitespace-nowrap shadow-sm"
            >
              <i class="fas fa-plus mr-1"></i> Tambah Data
            </button>
          </div>
        </div>

        <div class="overflow-x-auto rounded-lg border border-gray-200">
          <table class="w-full text-left border-collapse">
            <thead>
              <tr
                class="bg-gray-100/70 border-b border-gray-200 text-gray-600 font-semibold uppercase text-xs tracking-wider"
              >
                <th class="p-4" style="width: 50px">No</th>
                <th class="p-4">Info Guru</th>
                <th class="p-4">Identitas (NIP/NUPTK)</th>
                <th class="p-4">Kontak</th>
                <th class="p-4 text-center" style="width: 150px">Aksi</th>
              </tr>
            </thead>
            <tbody id="guru-table-body" class="divide-y divide-gray-200">
              <!-- Data baris tabel dirender di sini lewat js -->
            </tbody>
          </table>

          <div id="loading" class="text-center py-10 text-gray-400">
            <i class="fas fa-spinner fa-spin text-3xl mb-3"></i>
            <p>Memuat data ...</p>
          </div>

          <div id="no-data" class="hidden text-center py-10 text-gray-400">
            <i class="fas fa-folder-open text-3xl mb-3"></i>
            <p>Belum ada data atau tidak ditemukan.</p>
          </div>
        </div>
      </div>
    </main>

    <!-- Modal Formulir -->
    <div
      id="form-modal"
      class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden items-center justify-center p-4"
    >
      <div
        class="bg-white rounded-2xl shadow-xl w-full max-w-2xl max-h-[90vh] flex flex-col transform transition-all"
      >
        <div
          class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50/50 rounded-t-2xl"
        >
          <h3
            id="modal-title"
            class="text-xl font-bold text-gray-800 font-['Outfit']"
          >
            Tambah Data Guru
          </h3>
          <button
            onclick="closeModal()"
            class="text-gray-400 hover:text-red-500 transition text-lg w-8 h-8 rounded-full hover:bg-gray-100 flex items-center justify-center"
          >
            <i class="fas fa-times"></i>
          </button>
        </div>

        <div class="p-6 overflow-y-auto w-full custom-scroll">
          <form id="guru-form" class="space-y-4">
            <input type="hidden" id="entry-index" value="-1" />

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div class="col-span-1 md:col-span-2">
                <label class="block text-gray-700 font-medium mb-1"
                  >Nama Lengkap & Gelar</label
                >
                <input
                  type="text"
                  id="form-nama"
                  required
                  class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:border-[#29abe2] transition"
                  placeholder="Contoh: Dra. Hj. Elin Erlina, M.Hum"
                />
              </div>

              <div>
                <label class="block text-gray-700 font-medium mb-1"
                  >Jabatan / Tugas Tambahan</label
                >
                <input
                  type="text"
                  id="form-jabatan"
                  class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:border-[#29abe2] transition"
                  placeholder="Contoh: Waka Kurikulum"
                />
              </div>

              <div>
                <label class="block text-gray-700 font-medium mb-1"
                  >Status Kepegawaian</label
                >
                <select
                  id="form-status"
                  class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:border-[#29abe2] transition bg-white"
                >
                  <option value="PNS">PNS</option>
                  <option value="PPPK">PPPK</option>
                  <option value="CPNS">CPNS</option>
                  <option value="NON-ASN">NON-ASN</option>
                  <option value="-">-</option>
                </select>
              </div>

              <div>
                <label class="block text-gray-700 font-medium mb-1">NIP</label>
                <input
                  type="text"
                  id="form-nip"
                  class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:border-[#29abe2] transition"
                  placeholder="Kosongkan jika tidak ada, atau ketik -"
                />
              </div>

              <div>
                <label class="block text-gray-700 font-medium mb-1"
                  >NUPTK</label
                >
                <input
                  type="text"
                  id="form-nuptk"
                  class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:border-[#29abe2] transition"
                  placeholder="Kosongkan jika tidak ada"
                />
              </div>

              <div class="col-span-1 md:col-span-2">
                <label class="block text-gray-700 font-medium mb-1"
                  >Alamat Foto (URL Bebas/Relatif)</label
                >
                <input
                  type="text"
                  id="form-foto"
                  class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:border-[#29abe2] transition"
                  placeholder="Contoh: ../img/GURU/PNS/foto.jpg"
                />
              </div>

              <div class="col-span-1 md:col-span-2 border-t pt-4 mt-2">
                <h4
                  class="font-semibold text-gray-600 mb-3 uppercase text-xs tracking-wide"
                >
                  Informasi Kontak & Sosial
                </h4>
              </div>

              <div>
                <label class="block text-gray-700 font-medium mb-1"
                  >No. HP / WA</label
                >
                <input
                  type="text"
                  id="form-hp"
                  class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:border-[#29abe2] transition"
                  placeholder="Contoh: 085XXXXX"
                />
              </div>

              <div>
                <label class="block text-gray-700 font-medium mb-1"
                  >Email</label
                >
                <input
                  type="email"
                  id="form-email"
                  class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:border-[#29abe2] transition"
                  placeholder="Contoh: guru@gmail.com"
                />
              </div>

              <div>
                <label class="block text-gray-700 font-medium mb-1"
                  >Username Facebook</label
                >
                <input
                  type="text"
                  id="form-facebook"
                  class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:border-[#29abe2] transition"
                  placeholder="Ketik nama FB / link"
                />
              </div>

              <div>
                <label class="block text-gray-700 font-medium mb-1"
                  >Username Instagram</label
                >
                <input
                  type="text"
                  id="form-instagram"
                  class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:border-[#29abe2] transition"
                  placeholder="Ketik id IG / link"
                />
              </div>
            </div>
          </form>
        </div>

        <div
          class="px-6 py-4 border-t border-gray-100 flex justify-end gap-3 bg-gray-50/50 rounded-b-2xl"
        >
          <button
            onclick="closeModal()"
            class="px-5 py-2 text-gray-600 font-medium bg-white border border-gray-300 rounded-lg hover:bg-gray-50 transition"
          >
            Batal
          </button>
          <button
            onclick="saveData()"
            class="px-5 py-2 text-white font-medium bg-[#29abe2] hover:bg-[#208ab8] shadow-md rounded-lg transition flex items-center"
          >
            <i class="fas fa-save mr-2"></i> Simpan Data
          </button>
        </div>
      </div>
    </div>

    <style>
      /* Custom scrollbar for better aesthetics inside modal */
      .custom-scroll::-webkit-scrollbar {
        width: 6px;
      }
      .custom-scroll::-webkit-scrollbar-track {
        background: #f1f1f1;
        border-radius: 4px;
      }
      .custom-scroll::-webkit-scrollbar-thumb {
        background: #c1c1c1;
        border-radius: 4px;
      }
      .custom-scroll::-webkit-scrollbar-thumb:hover {
        background: #a8a8a8;
      }
    </style>

    <script>
      let guruData = [];

      // Muat data JSON awal
      async function loadData() {
        const loading = document.getElementById("loading");
        try {
          const response = await fetch("gurus.json");
          if (!response.ok) throw new Error("Gagal load json");
          guruData = await response.json();
          loading.classList.add("hidden");
          renderTable();
        } catch (err) {
          console.warn("Tidak dapat mengambil gurus.json secara fetch:", err);
          loading.innerHTML = `<p class="text-red-500"><i class="fas fa-exclamation-circle mr-1"></i> Data tidak dapat dimuat otomatis (harus mode server / localhost). Tetapi Anda bisa mulai mendata dari awal.</p>`;
          // Tetap dirender (kosong)
          renderTable();
        }
      }

      function renderTable() {
        const tbody = document.getElementById("guru-table-body");
        const noData = document.getElementById("no-data");
        const search = document
          .getElementById("search-bar")
          .value.toLowerCase();

        tbody.innerHTML = "";

        let filteredData = guruData.filter((g) =>
          g.nama?.toLowerCase().includes(search),
        );

        if (filteredData.length === 0) {
          noData.classList.remove("hidden");
        } else {
          noData.classList.add("hidden");
        }

        filteredData.forEach((guru) => {
          // Cari index aslinya di dalam guruData (penting untuk edit/delete beneran)
          const realIndex = guruData.findIndex((g) => g === guru);

          const tr = document.createElement("tr");
          tr.className = "hover:bg-gray-50 transition";

          const photoSrc =
            guru.foto ||
            "https://picsum.photos/40/40?random=" +
              Math.floor(Math.random() * 10);

          tr.innerHTML = `
          <td class="p-4 text-gray-500">${realIndex + 1}</td>
          <td class="p-4">
            <div class="flex items-center gap-3">
              <img src="${photoSrc}" class="w-10 h-10 rounded-full object-cover border shadow-sm" alt="${guru.nama}">
              <div>
                <p class="font-bold text-gray-800">${guru.nama}</p>
                <span class="text-[10px] font-medium px-2 py-0.5 rounded-full ${getStatusBadgeColor(guru.status)}">
                  ${guru.status || "-"}
                </span>
                <span class="text-[11px] text-gray-500 ml-1"><i class="fas fa-user-tag text-[9px]"></i> ${guru.jabatan || "-"}</span>
              </div>
            </div>
          </td>
          <td class="p-4 text-xs">
            <div class="text-gray-700"><span class="font-medium">NIP:</span> ${guru.nip || "-"}</div>
            <div class="text-gray-500"><span class="font-medium">NUPTK:</span> ${guru.nuptk || "-"}</div>
          </td>
          <td class="p-4 text-xs">
            <div class="text-gray-700"><i class="fas fa-phone mr-1 w-3"></i> ${guru.hp || "-"}</div>
            <div class="text-gray-500 truncate w-32" title="${guru.email || "-"}"><i class="fas fa-envelope mr-1 w-3"></i> ${guru.email || "-"}</div>
          </td>
          <td class="p-4 text-center">
            <div class="flex items-center justify-center gap-2">
              <button onclick="editData(${realIndex})" class="w-8 h-8 rounded-full bg-blue-50 text-blue-600 hover:bg-blue-600 hover:text-white transition" title="Edit">
                <i class="fas fa-pen text-xs"></i>
              </button>
              <button onclick="deleteData(${realIndex})" class="w-8 h-8 rounded-full bg-red-50 text-red-500 hover:bg-red-500 hover:text-white transition" title="Hapus">
                <i class="fas fa-trash text-xs"></i>
              </button>
            </div>
          </td>
        `;
          tbody.appendChild(tr);
        });
      }

      function getStatusBadgeColor(status) {
        if (!status) return "bg-gray-100 text-gray-600";
        const s = status.toUpperCase();
        if (s === "PNS") return "bg-green-100 text-green-700";
        if (s === "PPPK") return "bg-blue-100 text-blue-700";
        if (s === "CPNS") return "bg-teal-100 text-teal-700";
        if (s === "NON-ASN") return "bg-orange-100 text-orange-700";
        return "bg-gray-100 text-gray-600";
      }

      // Modal Handle
      const modal = document.getElementById("form-modal");
      function openModal(index = -1) {
        document.getElementById("entry-index").value = index;
        document.getElementById("guru-form").reset();

        if (index === -1) {
          document.getElementById("modal-title").innerText =
            "Tambah Data Guru Baru";
        } else {
          document.getElementById("modal-title").innerText = "Edit Data Guru";
          const g = guruData[index];
          document.getElementById("form-nama").value = g.nama || "";
          document.getElementById("form-jabatan").value = g.jabatan || "";
          document.getElementById("form-status").value = g.status || "-";
          document.getElementById("form-nip").value = g.nip || "";
          document.getElementById("form-nuptk").value = g.nuptk || "";
          document.getElementById("form-foto").value = g.foto || "";
          document.getElementById("form-hp").value = g.hp || "";
          document.getElementById("form-email").value = g.email || "";
          document.getElementById("form-facebook").value = g.facebook || "";
          document.getElementById("form-instagram").value = g.instagram || "";
        }

        modal.classList.remove("hidden");
        modal.classList.add("flex");
      }

      function closeModal() {
        modal.classList.add("hidden");
        modal.classList.remove("flex");
      }

      function editData(index) {
        openModal(index);
      }

      function deleteData(index) {
        if (confirm(`Yakin ingin menghapus guru: ${guruData[index].nama}?`)) {
          guruData.splice(index, 1);
          renderTable();
        }
      }

      function saveData() {
        const idx = parseInt(document.getElementById("entry-index").value);
        const nama = document.getElementById("form-nama").value.trim();

        if (!nama) {
          alert("Nama wajib diisi!");
          return;
        }

        const newData = {
          nama: nama,
          jabatan: document.getElementById("form-jabatan").value.trim(),
          foto: document.getElementById("form-foto").value.trim(),
          status: document.getElementById("form-status").value,
          nip: document.getElementById("form-nip").value.trim(),
          nuptk: document.getElementById("form-nuptk").value.trim(),
          hp: document.getElementById("form-hp").value.trim(),
          email: document.getElementById("form-email").value.trim(),
          facebook: document.getElementById("form-facebook").value.trim(),
          instagram: document.getElementById("form-instagram").value.trim(),
        };

        if (idx === -1) {
          // Baru
          guruData.push(newData);
        } else {
          // Update
          guruData[idx] = newData;
        }

        closeModal();
        renderTable();
      }

      function downloadJson() {
        const dataStr = JSON.stringify(guruData, null, 4);
        const blob = new Blob([dataStr], { type: "application/json" });
        const url = URL.createObjectURL(blob);

        const a = document.createElement("a");
        a.href = url;
        a.download = "gurus.json";
        document.body.appendChild(a);
        a.click();

        setTimeout(() => {
          document.body.removeChild(a);
          window.URL.revokeObjectURL(url);
        }, 0);
      }

      document.addEventListener("DOMContentLoaded", loadData);
    </script>
  </body>
</html>
